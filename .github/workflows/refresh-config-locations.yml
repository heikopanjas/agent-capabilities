name: Refresh coding-agent config locations

# Runs daily: re-researches the agents documented in
# coding-agent-config-locations.md and commits any verified updates
# back into that same file on main. The git history is the changelog.
#
# Requires repo secret ANTHROPIC_API_KEY (Settings -> Secrets and variables
# -> Actions -> New repository secret).

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: write # commit the refreshed document to main
  id-token: write # required by claude-code-action to mint an OIDC token

concurrency:
  group: refresh-config-locations
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute date
        id: vars
        run: echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      # Attempt 1 — soft-fails so a transient API 529 ("Overloaded") does
      # not lose the day's run; the retry below picks it up.
      - name: Research and refresh document
        id: attempt1
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --model claude-sonnet-4-6
            --allowedTools WebSearch,WebFetch,Read,Write,Edit,Glob,Grep
          prompt: |
            You are refreshing a reference document about coding-agent
            configuration locations.

            1. Read `coding-agent-config-locations.md` in the repository root.
               It uses confidence markers (star = spec/stable, diamond =
               documented current, circle = observed).
            2. For every agent in that document (Claude Code, Codex CLI,
               GitHub Copilot, Cursor, Mistral Vibe, OpenCode, Pi) and the
               cross-agent standards section, use WebSearch and WebFetch to
               verify the current state of each config path, file convention,
               skill/subagent location, and CLI behavior against the official
               documentation linked in each "Sources" block.
            3. Update `coding-agent-config-locations.md` IN PLACE with any
               path, flag, or behavior that has changed. Preserve the
               document's structure, tables, confidence markers, and
               "Sources" lists. Do NOT create any new files.
            4. Set the trailing "Last verified" line to today's date
               (${{ steps.vars.outputs.date }}).
            5. Do NOT run git, and do NOT create commits, branches, or pull
               requests. Only edit the file in place — a later workflow step
               handles committing.

      # The action exits 0 even when Claude itself errors out (e.g. a bad API
      # key fails on turn 1 for $0), so the step outcome alone cannot be
      # trusted. Inspect the result event in the execution log instead.
      - name: Check attempt 1 result
        id: check1
        env:
          CLAUDE_OUTPUT: ${{ steps.attempt1.outputs.execution_file }}
        run: |
          if [ -z "$CLAUDE_OUTPUT" ] || [ ! -f "$CLAUDE_OUTPUT" ]; then
            echo "No execution output from attempt 1 — treating as failure."
            echo "failed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ERR=$(jq -s 'flatten | map(select(.type=="result")) | last | .is_error' "$CLAUDE_OUTPUT" 2>/dev/null)
          echo "attempt 1 is_error=$ERR"
          if [ "$ERR" = "false" ]; then
            echo "failed=false" >> "$GITHUB_OUTPUT"
          else
            echo "failed=true" >> "$GITHUB_OUTPUT"
          fi

      # Wait out a brief capacity blip before retrying.
      - name: Cool-down before retry
        if: steps.check1.outputs.failed == 'true'
        run: sleep 120

      # Attempt 2 — only runs if attempt 1 errored. Also soft-fails; the
      # verification step below is what fails the job for real.
      - name: Research and refresh document (retry)
        id: attempt2
        if: steps.check1.outputs.failed == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --model claude-sonnet-4-6
            --allowedTools WebSearch,WebFetch,Read,Write,Edit,Glob,Grep
          prompt: |
            You are refreshing a reference document about coding-agent
            configuration locations.

            1. Read `coding-agent-config-locations.md` in the repository root.
               It uses confidence markers (star = spec/stable, diamond =
               documented current, circle = observed).
            2. For every agent in that document (Claude Code, Codex CLI,
               GitHub Copilot, Cursor, Mistral Vibe, OpenCode, Pi) and the
               cross-agent standards section, use WebSearch and WebFetch to
               verify the current state of each config path, file convention,
               skill/subagent location, and CLI behavior against the official
               documentation linked in each "Sources" block.
            3. Update `coding-agent-config-locations.md` IN PLACE with any
               path, flag, or behavior that has changed. Preserve the
               document's structure, tables, confidence markers, and
               "Sources" lists. Do NOT create any new files.
            4. Set the trailing "Last verified" line to today's date
               (${{ steps.vars.outputs.date }}).
            5. Do NOT run git, and do NOT create commits, branches, or pull
               requests. Only edit the file in place — a later workflow step
               handles committing.

      # Ground truth: fail the job if the effective Claude run still errored,
      # so a dead API key surfaces as a red ✕ instead of a silent green tick.
      # Uses attempt 2's log if the retry ran, otherwise attempt 1's.
      - name: Verify Claude succeeded
        env:
          CLAUDE_OUTPUT: ${{ steps.attempt2.outputs.execution_file || steps.attempt1.outputs.execution_file }}
        run: |
          if [ -z "$CLAUDE_OUTPUT" ] || [ ! -f "$CLAUDE_OUTPUT" ]; then
            echo "::error::Claude produced no execution output — the run did not complete."
            exit 1
          fi
          ERR=$(jq -s 'flatten | map(select(.type=="result")) | last | .is_error' "$CLAUDE_OUTPUT" 2>/dev/null)
          if [ "$ERR" != "false" ]; then
            echo "::error::Claude run reported is_error=$ERR — check the API key, credits, or model access. Failing so this is not masked as a successful run."
            jq -s 'flatten | map(select(.type=="result")) | last' "$CLAUDE_OUTPUT" 2>/dev/null || true
            exit 1
          fi
          echo "Claude run completed successfully (is_error=false)."

      - name: Commit refreshed document
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          FILE="coding-agent-config-locations.md"
          git add "$FILE"
          if git diff --cached --quiet; then
            echo "No changes to $FILE — nothing to commit."
          else
            git commit -m "Daily refresh: re-verify coding-agent config locations"
            # claude-code-action rewrites the origin remote with its own
            # short-lived token, so a bare `git push` fails auth. Push via an
            # explicit GITHUB_TOKEN URL instead (contents: write covers this).
            git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
          fi
